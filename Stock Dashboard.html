<!DOCTYPE html>
<!-- saved from url=(0022)http://127.0.0.1:5000/ -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Stock Dashboard</title>
    <script src="./Stock Dashboard_files/chart.js.download"></script>
</head>

<body style="font-family: Arial; text-align:center; background:#111; color:white;" data-np-autofill-form-type="other" data-np-checked="1" data-np-watching="1">

    <h1>📈 Stock Dashboard</h1>

    <input type="text" id="stock" placeholder="Enter Stock (AAPL)" data-np-checked="1">
    <button onclick="getData()" data-np-autofill-submit="">Get Data</button>

    <h2 id="price">💰 Live Price: 251.63999938964844</h2>
    <h2 id="prediction">📊 Predicted Price: 245.83652673018602</h2>

    <br>

    <canvas id="chart" width="1871" height="935" style="display: block; box-sizing: border-box; height: 748.4px; width: 1496.8px;"></canvas>

    <script>
        let chart;

        function getData() {
            let stock = document.getElementById("stock").value;

            if (!stock) {
                alert("Enter stock name!");
                return;
            }

            // Loading
            document.getElementById("price").innerText = "Loading...";
            document.getElementById("prediction").innerText = "";

            // 📊 Chart Data
            fetch(`/stock/${stock}`)
                .then(res => res.json())
                .then(data => {

                    if (!data.prices || data.prices.length === 0) {
                        alert("No data found!");
                        return;
                    }

                    let ctx = document.getElementById('chart').getContext('2d');

                    if (chart) chart.destroy();

                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.dates,
                            datasets: [{
                                label: stock + " Price",
                                data: data.prices,
                                borderWidth: 2
                            }]
                        }
                    });
                });

            // 💰 Live Price
            fetch(`/price/${stock}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("price").innerText =
                        "💰 Live Price: " + data.price;
                });

            // 🤖 Prediction
            fetch(`/predict/${stock}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("prediction").innerText =
                        "📊 Predicted Price: " + data.prediction;
                });
        }
    </script>


</body></html>
