<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; text-align:center; background:#111; color:white;">

    <h1>📈 Stock Dashboard</h1>

    <input type="text" id="stock" placeholder="Enter Stock (AAPL)">
    <button onclick="getData()">Get Data</button>

    <h2 id="price"></h2>
    <h2 id="prediction"></h2>

    <br>

    <canvas id="chart" width="600" height="300"></canvas>

    <script>
        let chart;

        function getData() {
            let stock = document.getElementById("stock").value;

            if (!stock) {
                alert("Enter stock name!");
                return;
            }

            // Loading
            document.getElementById("price").innerText = "Loading...";
            document.getElementById("prediction").innerText = "";

            // 📊 Chart Data
            fetch(`/stock/${stock}`)
                .then(res => res.json())
                .then(data => {

                    if (!data.prices || data.prices.length === 0) {
                        alert("No data found!");
                        return;
                    }

                    let ctx = document.getElementById('chart').getContext('2d');

                    if (chart) chart.destroy();

                    chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.dates,
                            datasets: [{
                                label: stock + " Price",
                                data: data.prices,
                                borderWidth: 2
                            }]
                        }
                    });
                });

            // 💰 Live Price
            fetch(`/price/${stock}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("price").innerText =
                        "💰 Live Price: " + data.price;
                });

            // 🤖 Prediction
            fetch(`/predict/${stock}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("prediction").innerText =
                        "📊 Predicted Price: " + data.prediction;
                });
        }
    </script>

</body>
</html>
